services:

  # ── Serviço 1: Banco de dados MySQL ─────────────────────────────────────────
  mysql:
    image: mysql:8.0            
    container_name: ambtech_mysql
    restart: unless-stopped     

    env_file:
      - .env                     

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

    ports:
      - "3316:3306"   # porta 3316 no computador → 3306 dentro do container
                      # assim acessa pelo DBeaver/MySQL Workbench na 3316

    volumes:
      - mysql_data:/var/lib/mysql           # persiste os dados do banco entre reinicializações
      - ./db:/docker-entrypoint-initdb.d 
                                            # o MySQL executa automaticamente os .sql desta pasta
                                            # apenas na PRIMEIRA vez que o container sobe

    healthcheck:
      # verifica se o MySQL está pronto para receber conexões
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s       # testa a cada 5 segundos
      timeout: 5s        # aguarda até 5 s pela resposta
      retries: 30        # tenta até 30 vezes antes de desistir
      start_period: 25s  # espera 25 s antes de começar a testar (MySQL demora para iniciar)


  # ── Serviço 2: Aplicação Flask ───────────────────────────────────────────────
  backend:
    build:
      context: .    # pasta onde está o Dockerfile e o código Python (raiz)
    container_name: ambtech_backend
    restart: unless-stopped

    env_file:
      - .env

    depends_on:
      mysql:
        condition: service_healthy   # só sobe APÓS o MySQL estar saudável (healthcheck ok)

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      FLASK_DEBUG: ${FLASK_DEBUG}

    ports:
      - "5000:5000"   

    volumes:
      - ./app:/app    # monta o código local dentro do container
                     

volumes:
  mysql_data:  